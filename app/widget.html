<!DOCTYPE html>
<html class="antialiased font-sans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter'] } } } }
    </script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300 overflow-x-hidden">

    <div id="initial-preloader" class="fixed inset-0 bg-slate-950 z-[1000] flex flex-col items-center justify-center transition-opacity duration-500 overflow-hidden">
        <div class="relative flex flex-col items-center max-w-sm w-full px-6 text-center space-y-8">
            <div class="relative w-20 h-20 flex items-center justify-center">
                <div class="absolute inset-0 rounded-full border border-blue-500/20 animate-[ping_2s_infinite]"></div>
                <div class="absolute inset-4 rounded-full border-2 border-t-blue-500 border-r-transparent border-b-indigo-500 border-l-transparent animate-[spin_1.5s_linear_infinite]"></div>
            </div>
            <p id="loader-status-text" class="text-xs font-black tracking-widest text-white uppercase">Syncing Portal...</p>
        </div>
    </div>

    <div id="main-portal" class="max-w-[1050px] mx-auto p-2 pb-20 opacity-0 transition-opacity duration-500">
        <div class="flex justify-between items-center mb-4 px-2">
            <h1 class="text-[8px] font-black tracking-[0.3em] text-slate-400 uppercase leading-none">FTA Case Information</h1>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">

            <div class="px-4 pt-4 pb-1 border-b border-slate-100 dark:border-slate-700">
                <h3 class="text-[8px] font-black text-slate-900 dark:text-white uppercase tracking-[0.2em] mb-3 flex items-center">
                    <span class="w-1 h-2 bg-slate-500 rounded-full mr-2"></span>Client Overview
                </h3>
                <div class="grid grid-cols-3 gap-3 pb-3">
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Account Name</label>
                        <div id="field-account-name" class="w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-600 dark:text-slate-400"></div>
                    </div>
                    <div id="group-client-name" class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Client Name</label>
                        <div id="field-client-name" class="w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-600 dark:text-slate-400"></div>
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Document Type</label>
                        <div id="field-document-type" class="w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-600 dark:text-slate-400"></div>
                    </div>
                </div>
            </div>

            <div id="section-eid" class="hidden px-4 pt-4 pb-1 border-b border-slate-100 dark:border-slate-700">
                <h3 class="text-[8px] font-black text-slate-900 dark:text-white uppercase tracking-[0.2em] mb-3 flex items-center">
                    <span class="w-1 h-2 bg-amber-500 rounded-full mr-2"></span>Emirates ID / Residence Visa
                </h3>
                <div id="attach-eid" class="hidden grid grid-cols-1 gap-3 pb-3">
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Upload Document for OCR</label>
                        <input id="attach-eid-input" type="file" accept="image/*,.pdf" class="form-input form-file w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200" onchange="handleFileSelected(this, 'eid')" />
                        <div id="attach-eid-prompt" class="hidden mt-3 p-3 rounded-lg text-[10px] font-semibold border-l-4"></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 pb-3">
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Date of Birth</label>
                        <input id="eid-dob" type="date" class="dob-field form-input w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200" />
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Nationality</label>
                        <select id="eid-nationality" class="nationality-field form-input form-select w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200"></select>
                    </div>
                    <div class="col-span-2 space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Emirates ID Number</label>
                        <input id="field-eid-number" type="text" class="form-input w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200 font-mono" />
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">EID Issue Date</label>
                        <input id="field-eid-issue" type="date" class="form-input w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200" />
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">EID Expiry Date</label>
                        <input id="field-eid-expiry" type="date" class="form-input w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200" />
                    </div>
                </div>
            </div>

            <div id="section-passport" class="hidden px-4 pt-4 pb-4 border-b border-slate-100 dark:border-slate-700">
                <h3 class="text-[8px] font-black text-slate-900 dark:text-white uppercase tracking-[0.2em] mb-3 flex items-center">
                    <span class="w-1 h-2 bg-indigo-500 rounded-full mr-2"></span>Passport Details
                </h3>
                <div id="attach-passport" class="hidden grid grid-cols-1 gap-3 pb-3">
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Upload Document for OCR</label>
                        <input id="attach-passport-input" type="file" accept="image/*,.pdf" class="form-input form-file w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200" onchange="handleFileSelected(this, 'passport')" />
                        <div id="attach-passport-prompt" class="hidden mt-3 p-3 rounded-lg text-[10px] font-semibold border-l-4"></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Date of Birth</label>
                        <input id="pp-dob" type="date" class="dob-field form-input w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200" />
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Nationality</label>
                        <select id="pp-nationality" class="nationality-field form-input form-select w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200"></select>
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">PP Number</label>
                        <input id="field-pp-number" type="text" class="form-input w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200 font-mono" />
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">PP Issuing Country</label>
                        <select id="field-pp-country" class="form-input form-select w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200"></select>
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">PP Issue Date</label>
                        <input id="field-pp-issue" type="date" class="form-input w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200" />
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">PP Expiry Date</label>
                        <input id="field-pp-expiry" type="date" class="form-input w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200" />
                    </div>
                </div>
            </div>

            <div id="section-tl" class="hidden px-4 pt-4 pb-4">
                <h3 class="text-[8px] font-black text-slate-900 dark:text-white uppercase tracking-[0.2em] mb-3 flex items-center">
                    <span class="w-1 h-2 bg-emerald-500 rounded-full mr-2"></span>Trade License Information
                </h3>
                <div id="attach-tl" class="hidden grid grid-cols-1 gap-3 pb-3">
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Upload Document for OCR</label>
                        <input id="attach-tl-input" type="file" accept="image/*,.pdf" class="form-input form-file w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200" onchange="handleFileSelected(this, 'tl')" />
                        <div id="attach-tl-prompt" class="hidden mt-3 p-3 rounded-lg text-[10px] font-semibold border-l-4"></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2 space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Trade License Name</label>
                        <input id="tl-name" type="text" class="form-input w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200" />
                    </div>
                    <div class="col-span-2 space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Trade License Number</label>
                        <input id="tl-license-number" type="text" class="form-input w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200 font-mono" />
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Trade License Start Date</label>
                        <input id="tl-start-date" type="date" class="form-input w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200" />
                    </div>
                    <div class="space-y-0.5">
                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest block">Trade License Expiry Date</label>
                        <input id="tl-expiry-date" type="date" class="form-input w-full px-2 py-1.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-[11px] font-semibold text-slate-800 dark:text-slate-200" />
                    </div>
                </div>
            </div>

        </div>

        <div class="flex justify-center mt-6 mb-10 px-4 gap-3">
            <button onclick="closeAndReload()" class="bg-amber-400 text-amber-900 font-black px-6 py-3 rounded-xl text-[10px] shadow-lg active:scale-[0.98] transition-all hover:bg-amber-300">Close & Refresh</button>
            <button onclick="submitForm()" class="bg-slate-900 text-white font-black px-10 py-3 rounded-xl text-[10px] shadow-xl active:scale-[0.98] transition-all hover:translate-y-[-1px]">SAVE RECORD</button>
        </div>
    </div>

    <div id="success-modal" class="hidden fixed inset-0 bg-slate-950/50 z-[2000] flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-2xl max-w-xs w-full text-center border border-slate-200 dark:border-slate-700">
            <div class="w-12 h-12 bg-emerald-100 dark:bg-emerald-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-lg font-black text-slate-800 dark:text-white mb-2">Success!</h2>
            <p class="text-[11px] text-slate-500 mb-6">The record has been updated successfully.</p>
            <button onclick="closeAndReload()" class="w-full bg-slate-900 text-white font-black py-2.5 rounded-xl text-[10px] hover:bg-slate-800 transition-all">Close</button>
        </div>
    </div>

    <div id="error-modal" class="hidden fixed inset-0 bg-slate-950/50 z-[2000] flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-2xl max-w-xs w-full text-center border border-slate-200 dark:border-slate-700">
            <div class="w-12 h-12 bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
            </div>
            <h2 class="text-lg font-black text-slate-800 dark:text-white mb-2">Update Failed</h2>
            <p class="text-[11px] text-slate-500 mb-6">There was an error updating the record. Please try again.</p>
            <button onclick="closeAndReload()" class="w-full bg-slate-900 text-white font-black py-2.5 rounded-xl text-[10px] hover:bg-slate-800 transition-all">Close</button>
        </div>
    </div>

    <div id="loading-overlay" class="hidden fixed inset-0 z-[3000] bg-white/70 backdrop-blur-[2px] flex flex-col items-center justify-center">
        <div class="spinner mb-4"></div>
        <p id="loading-status-text" class="text-[10px] font-black text-slate-800 uppercase tracking-[0.2em]">Uploading Attachment...</p>
    </div>

    <script src="./js/app.js"></script>
</body>
</html>
