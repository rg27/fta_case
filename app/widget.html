<!DOCTYPE html>
<html class="antialiased font-sans">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter'] } } } }
    </script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 transition-colors duration-300">

    <div id="initial-preloader" class="fixed inset-0 bg-slate-950 z-[1000] flex flex-col items-center justify-center transition-opacity duration-500 overflow-hidden">
        <div class="absolute inset-0 bg-[linear-gradient(to_right,#0f172a_1px,transparent_1px),linear-gradient(to_bottom,#0f172a_1px,transparent_1px)] bg-[size:4rem_4rem] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_50%,#000_70%,transparent_100%)] opacity-60"></div>
        <div class="relative flex flex-col items-center max-w-sm w-full px-6 text-center space-y-8">
            <div class="relative w-20 h-20 flex items-center justify-center">
                <div class="absolute inset-0 rounded-full border border-blue-500/20 animate-[ping_2s_infinite]"></div>
                <div class="absolute inset-2 rounded-xl border border-indigo-500/30 rotate-45 animate-[spin_8s_linear_infinite]"></div>
                <div class="absolute inset-4 rounded-full border-2 border-t-blue-500 border-r-transparent border-b-indigo-500 border-l-transparent animate-[spin_1.5s_linear_infinite]"></div>
                <div class="w-4 h-4 bg-gradient-to-tr from-blue-500 to-indigo-500 rounded-md shadow-[0_0_15px_rgba(59,130,246,0.5)]"></div>
            </div>
            <div class="space-y-2">
                <h2 class="text-[10px] font-black tracking-[0.5em] text-blue-400 uppercase leading-none">TLZ FTA Compliance</h2>
                <p id="loader-status-text" class="text-xs font-black tracking-widest text-white uppercase">Syncing Portal...</p>
            </div>
            <div class="w-full h-[3px] bg-slate-900 rounded-full overflow-hidden border border-slate-800">
                <div class="h-full bg-gradient-to-r from-blue-500 via-indigo-500 to-emerald-500 w-full rounded-full animate-[pulse_1.5s_infinite] origin-left"></div>
            </div>
            <div class="w-full bg-slate-900/60 backdrop-blur-md border border-slate-800/80 rounded-xl p-4 min-h-[56px] flex items-center justify-center">
                <div class="flex items-center gap-3 text-left w-full">
                    <span class="flex h-2 w-2 relative">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <p id="telemetry-ticker" class="text-[10px] font-mono tracking-wider text-slate-400 uppercase truncate">Establishing Secure CRM Handshake...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-portal" class="max-w-[1000px] mx-auto p-4 pb-32 opacity-0 transition-opacity duration-500">

        <div class="flex justify-between items-center mb-10 px-2">
            <div>
                <h1 class="text-[10px] font-black tracking-[0.4em] text-slate-400 uppercase leading-none mb-1">FTA Compliance Portal</h1>
                <p id="last-update-time" class="text-[9px] font-bold text-slate-500 uppercase tracking-tight">Initializing...</p>
            </div>
            <div class="flex items-center gap-4 text-[9px] font-black uppercase tracking-wider text-slate-400">
                <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-green-400 inline-block"></span>Pre-filled from record</span>
                <span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-slate-300 dark:bg-slate-600 inline-block"></span>Manual entry</span>
            </div>
        </div>

        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">

            <!-- Section: Personal Information -->
            <div class="px-6 pt-6 pb-2 border-b border-slate-100 dark:border-slate-700">
                <h3 class="text-[9px] font-black text-slate-900 dark:text-white uppercase tracking-[0.2em] mb-5 flex items-center">
                    <span class="w-1 h-3 bg-blue-500 rounded-full mr-2"></span>Personal Information
                </h3>
                <div class="grid grid-cols-2 gap-4 pb-5">

                    <div class="space-y-1.5">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest block mb-2">
                            Updated Date of Birth
                            <span class="ml-1.5 px-1.5 py-0.5 bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-400 rounded text-[7px] font-black">FROM RECORD</span>
                        </label>
                        <input id="field-dob" type="date" class="form-input w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-sm font-semibold text-slate-800 dark:text-slate-200" />
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest block mb-2">
                            Updated Nationality
                            <span class="ml-1.5 px-1.5 py-0.5 bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-400 rounded text-[7px] font-black">FROM RECORD</span>
                        </label>
                        <select id="field-nationality" class="form-input form-select w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-sm font-semibold text-slate-800 dark:text-slate-200"></select>
                    </div>

                </div>
            </div>

            <!-- Section: Emirates ID / Residence Visa -->
            <div class="px-6 pt-6 pb-2 border-b border-slate-100 dark:border-slate-700">
                <h3 class="text-[9px] font-black text-slate-900 dark:text-white uppercase tracking-[0.2em] mb-5 flex items-center">
                    <span class="w-1 h-3 bg-amber-500 rounded-full mr-2"></span>Emirates ID / Residence Visa
                </h3>
                <div class="grid grid-cols-3 gap-4 pb-5">

                    <div class="col-span-3 space-y-1.5">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest block mb-2">Updated Emirates ID Number</label>
                        <input id="field-eid-number" type="text" placeholder="784-XXXX-XXXXXXX-X" class="form-input w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-sm font-semibold text-slate-800 dark:text-slate-200 placeholder:text-slate-300 dark:placeholder:text-slate-600 font-mono" />
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest block mb-2">Updated Emirates ID / RV Issue Date</label>
                        <input id="field-eid-issue" type="date" class="form-input w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-sm font-semibold text-slate-800 dark:text-slate-200" />
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest block mb-2">Updated Emirates ID / RV Expiry Date</label>
                        <input id="field-eid-expiry" type="date" class="form-input w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-sm font-semibold text-slate-800 dark:text-slate-200" />
                    </div>

                    <div></div>

                </div>
            </div>

            <!-- Section: Passport Details -->
            <div class="px-6 pt-6 pb-6">
                <h3 class="text-[9px] font-black text-slate-900 dark:text-white uppercase tracking-[0.2em] mb-5 flex items-center">
                    <span class="w-1 h-3 bg-indigo-500 rounded-full mr-2"></span>Passport Details
                </h3>
                <div class="grid grid-cols-2 gap-4">

                    <div class="space-y-1.5">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest block mb-2">Updated PP Number</label>
                        <input id="field-pp-number" type="text" placeholder="e.g. A12345678" class="form-input w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-sm font-semibold text-slate-800 dark:text-slate-200 placeholder:text-slate-300 dark:placeholder:text-slate-600 font-mono" />
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest block mb-2">Updated PP Issuing Country</label>
                        <select id="field-pp-country" class="form-input form-select w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-sm font-semibold text-slate-800 dark:text-slate-200"></select>
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest block mb-2">Updated PP Issue Date</label>
                        <input id="field-pp-issue" type="date" class="form-input w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-sm font-semibold text-slate-800 dark:text-slate-200" />
                    </div>

                    <div class="space-y-1.5">
                        <label class="text-[8px] font-black text-slate-400 uppercase tracking-widest block mb-2">Updated PP Expiry Date</label>
                        <input id="field-pp-expiry" type="date" class="form-input w-full px-3 py-2.5 rounded-xl border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-900/40 text-sm font-semibold text-slate-800 dark:text-slate-200" />
                    </div>

                </div>
            </div>

        </div>
    </div>

    <div class="fixed bottom-6 left-0 right-0 flex justify-center z-[100] px-4 gap-4">
        <button onclick="closeAndReload()" class="bg-amber-400 text-amber-900 font-black px-8 py-5 rounded-2xl text-xs shadow-xl active:scale-[0.98] transition-all hover:bg-amber-300">Close & Refresh</button>
        <button id="submit-btn" onclick="submitForm()" class="bg-slate-900 text-white font-black px-12 py-5 rounded-2xl text-xs shadow-2xl active:scale-[0.98] transition-all flex items-center justify-center gap-3 hover:translate-y-[-2px]">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
            SAVE RECORD
        </button>
    </div>

    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 z-[200] px-5 py-3 bg-slate-900 text-white text-[11px] font-black uppercase tracking-widest rounded-2xl shadow-2xl opacity-0 translate-y-2 transition-all duration-300 pointer-events-none">
        ✓ Record updated successfully.
    </div>

    <script>
        const logs = ["Establishing Secure CRM Handshake...", "Fetching FTA Case Record...", "Loading Compliance Fields...", "Preparing Portal..."];
        let index = 0;
        setInterval(() => {
            const el = document.getElementById("telemetry-ticker");
            if (el) {
                index = (index + 1) % logs.length;
                el.style.opacity = 0;
                setTimeout(() => { el.textContent = logs[index]; el.style.opacity = 1; }, 200);
            }
        }, 2200);
    </script>
    <script src="./js/app.js"></script>
</body>
</html>
